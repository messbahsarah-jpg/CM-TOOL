<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CM Tool — Kairos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --papaya:#BD6809; --paradise:#9A3F4A; --fuschia:#2F4731; --palm:#3D1419;
    --purple:#7C3AED;
    --bg:#ffffff; --surface:#F5F0EB; --surface2:#EDE6DC;
    --text:#1a1009; --text-dim:#7a6a5a; --border:#DDD5CA;
    --text-on-dark:#F5EFE6; --text-dim-dark:rgba(245,239,230,0.6); --border-dark:rgba(245,239,230,0.15);
    --r:14px; --rs:10px; --nav-h:68px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overscroll-behavior:none; }
  .app { display:flex; flex-direction:column; height:100dvh; }

  /* TOPBAR */
  .topbar { background:var(--palm); padding:12px 16px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; position:relative; z-index:10; }
  .topbar-title { font-size:16px; font-weight:700; color:var(--text-on-dark); }
  .topbar-page { font-size:11px; color:var(--text-dim-dark); font-family:'DM Mono',monospace; }
  .acc-switcher { display:flex; gap:6px; }
  .acc-btn { width:32px; height:32px; border-radius:50%; border:2px solid transparent; cursor:pointer; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:'DM Sans',sans-serif; color:#fff; opacity:0.4; }
  .acc-btn.active { border-color:#fff; opacity:1; box-shadow:0 0 0 2px var(--papaya); transform:scale(1.08); }
  .acc-lf { background:var(--paradise); }
  .acc-cpc { background:var(--papaya); }
  .acc-cm { background:var(--fuschia); }

  /* MAIN */
  .main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px calc(var(--nav-h)+16px); }
  .page { display:none; }
  .page.active { display:block; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; align-items:stretch; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border:none; background:none; cursor:pointer; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500; padding:8px 4px; transition:all 0.15s; }
  .nav-btn svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
  .nav-btn.active { color:var(--papaya); }

  /* UTILS */
  .loading { display:flex; align-items:center; gap:10px; color:var(--text-dim); font-size:14px; padding:48px 0; justify-content:center; }
  .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--papaya); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { text-align:center; padding:48px 0; color:var(--text-dim); font-size:13px; }
  .btn { padding:12px 20px; border-radius:var(--rs); font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .btn:active { transform:scale(0.97); }
  .btn-papaya { background:var(--papaya); color:#fff; }
  .btn-paradise { background:var(--paradise); color:#fff; }
  .btn-fuschia { background:var(--fuschia); color:#fff; }
  .tag { font-size:10px; padding:3px 8px; border-radius:20px; font-weight:600; display:inline-block; }
  .tag-papaya { background:var(--papaya); color:#fff; }
  .tag-paradise { background:var(--paradise); color:#fff; }
  .tag-fuschia { background:var(--fuschia); color:#fff; }
  .tag-purple { background:var(--purple); color:#fff; }
  .tag-gray { background:var(--surface2); color:var(--text-dim); }
  .input { width:100%; padding:11px 14px; border-radius:var(--rs); border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.15s; margin-bottom:10px; }
  .input:focus { border-color:var(--papaya); }
  .input::placeholder { color:var(--text-dim); }
  select.input { cursor:pointer; }
  .input-label { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:5px; display:block; font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:0.6px; }
  .ms-opt { padding:6px 12px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.15s; }
  .ms-opt.selected { background:var(--papaya); border-color:var(--papaya); color:#fff; }
  .multi-select { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }

  .nav-add-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:none; background:none; cursor:pointer; padding:8px 4px; }

  /* MODAL / POPUP */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; align-items:flex-end; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:20px 20px 0 0; padding:20px 16px 32px; width:100%; max-height:88dvh; overflow-y:auto; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .modal-title { font-size:17px; font-weight:700; }
  .modal-close { width:30px; height:30px; border-radius:50%; background:var(--surface); border:none; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .modal-tabs { display:flex; gap:0; background:var(--surface); border-radius:10px; padding:3px; margin-bottom:16px; }
  .modal-tab { flex:1; padding:8px; border-radius:8px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:var(--text-dim); cursor:pointer; transition:all 0.15s; }
  .modal-tab.active { background:#fff; color:var(--palm); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
  .modal-form { display:none; }
  .modal-form.active { display:block; }
  .form-row { margin-bottom:14px; }

  /* ===== PAGE 1 — FEED TRENDS ===== */
  .feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .feed-title { font-size:20px; font-weight:700; }
  .feed-sub { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .feed-list { display:flex; flex-direction:column; gap:14px; }

  .trend-feed-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); overflow:hidden; transition:all 0.15s; }
  .trend-feed-card.selected { border-color:var(--papaya); }
  .trend-feed-top { padding:14px 16px 10px; }
  .trend-feed-actions { display:flex; align-items:center; justify-content:space-between; padding:8px 16px 12px; border-top:1px solid var(--surface); }
  .tfa-left { display:flex; gap:8px; align-items:center; }
  .tcheck-row { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--text-dim); cursor:pointer; }
  .tcheck-box { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); background:#fff; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
  .trend-feed-card.selected .tcheck-box { background:var(--papaya); border-color:var(--papaya); }
  .tcheck-box svg { width:11px; height:11px; stroke:#fff; opacity:0; }
  .trend-feed-card.selected .tcheck-box svg { opacity:1; }
  .trend-feed-card.selected .tcheck-row { color:var(--papaya); }
  .date-mini-input { padding:5px 8px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text); outline:none; width:130px; }
  .date-mini-input:focus { border-color:var(--papaya); }
  .ttitle { font-size:15px; font-weight:700; margin-bottom:6px; color:var(--text); }
  .tmeta { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
  .tdesc { font-size:12px; color:var(--text-dim); line-height:1.5; margin-bottom:6px; }
  .tmusic { font-size:11px; color:var(--papaya); font-family:'DM Mono',monospace; }
  .del-btn { font-size:11px; padding:4px 10px; border-radius:8px; border:1px solid #fecaca; background:#fff5f5; color:#dc2626; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600; }

  /* Selbar */
  .selbar { position:fixed; bottom:calc(var(--nav-h)+10px); left:12px; right:72px; background:var(--papaya); border-radius:var(--r); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; opacity:0; pointer-events:none; transition:all 0.2s; box-shadow:0 8px 24px rgba(189,104,9,0.35); z-index:98; }
  .selbar.visible { opacity:1; pointer-events:all; }
  .selbar-txt { color:#fff; font-size:12px; font-weight:700; }

  /* ===== PAGE 2 — MON CONTENU ===== */
  .content-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .tabs { display:flex; gap:0; background:var(--surface); border-radius:10px; padding:3px; margin-bottom:14px; }
  .tab { flex:1; padding:8px; border-radius:8px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:var(--text-dim); cursor:pointer; transition:all 0.15s; }
  .tab.active { background:#fff; color:var(--palm); box-shadow:0 1px 4px rgba(0,0,0,0.1); }

  .content-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:12px; }
  .content-card:active { transform:scale(0.98); }
  .cc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .cc-info { flex:1; }
  .cc-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .cc-meta { font-size:11px; color:var(--text-dim); }
  .cc-badge { font-size:10px; padding:4px 9px; border-radius:20px; font-weight:600; flex-shrink:0; }
  .cb-filmer { background:#fff3e0; color:#c2410c; }
  .cb-filme { background:#e1f5ee; color:#1E5245; }
  .cb-montage { background:#ede9fe; color:#5b21b6; }
  .cb-publie { background:#f0fdf4; color:#166534; }
  .cc-arrow { color:var(--text-dim); font-size:18px; }

  /* ===== PAGE 3 PLANNING ===== */
  .plan-month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .plan-month-label { font-size:16px; font-weight:700; }
  .mnav-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text); }
  .cal-days-header { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:3px; }
  .cal-dh { font-size:9px; font-weight:700; color:var(--text-dim); text-align:center; padding:4px 0; font-family:'DM Mono',monospace; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:14px; }
  .cal-cell { min-height:54px; border-radius:8px; background:#fff; border:1px solid var(--border); padding:4px; transition:all 0.15s; }
  .cal-cell.empty { background:var(--surface); border-color:transparent; }
  .cal-cell.today { border-color:var(--papaya); }
  .cal-cell.drag-over { background:#FFF8F0; border-color:var(--papaya); border-style:dashed; }
  .cal-dnum { font-size:10px; font-weight:700; color:var(--text-dim); margin-bottom:3px; font-family:'DM Mono',monospace; }
  .cal-dnum.today-n { color:var(--papaya); font-weight:900; }
  .vpill { display:block; padding:4px 6px; border-radius:6px; margin-bottom:2px; font-size:10px; font-weight:600; line-height:1.2; cursor:grab; border:none; width:100%; text-align:left; font-family:'DM Sans',sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:opacity 0.15s; touch-action:none; }
  .vpill:active { cursor:grabbing; }
  .vpill.dragging { opacity:0.35; }
  .vp-filmer { background:var(--papaya); color:#fff; }
  .vp-filme { background:var(--fuschia); color:#fff; }
  .vp-montage { background:var(--paradise); color:#fff; }
  .vp-publie { background:var(--palm); color:var(--text-on-dark); }
  .vp-story { background:var(--purple); color:#fff; border:1px dashed #C4B5FD; }
  .vcard { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.15s; }
  .vcard:active { transform:scale(0.98); }

  /* ===== PAGE 4 FICHE ===== */
  .back-btn { display:flex; align-items:center; gap:7px; color:var(--text-dim); font-size:13px; cursor:pointer; margin-bottom:14px; border:none; background:none; font-family:'DM Sans',sans-serif; padding:0; }
  .fiche-hero { background:var(--paradise); border-radius:var(--r); padding:16px; margin-bottom:12px; }
  .fiche-hero-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
  .fiche-hero-title { font-size:18px; font-weight:700; color:#fff; line-height:1.2; flex:1; padding-right:10px; }
  .statut-badge { font-size:11px; font-weight:700; padding:5px 11px; border-radius:20px; flex-shrink:0; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; }
  .sb-filmer { background:var(--papaya); color:#fff; }
  .sb-filme { background:var(--fuschia); color:#fff; }
  .sb-montage { background:rgba(0,0,0,0.3); color:#fff; }
  .sb-publie { background:#fff; color:var(--paradise); }
  .trend-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(0,0,0,0.2); border-radius:8px; padding:5px 10px; margin-bottom:12px; }
  .trend-pill-label { font-size:9px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.8px; font-family:'DM Mono',monospace; }
  .trend-pill-val { font-size:12px; font-weight:600; color:#fff; }
  .progress-steps { display:flex; align-items:center; }
  .ps-step { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .ps-dot { width:8px; height:8px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:transparent; }
  .ps-dot.done { background:var(--papaya); border-color:var(--papaya); }
  .ps-dot.active { background:#fff; border-color:#fff; }
  .ps-lbl { font-size:8px; color:rgba(255,255,255,0.4); font-family:'DM Mono',monospace; white-space:nowrap; }
  .ps-lbl.active { color:#fff; font-weight:700; }
  .ps-line { flex:1; height:2px; background:rgba(255,255,255,0.2); margin-bottom:11px; }
  .ps-line.done { background:var(--papaya); }
  .plans-section { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:12px; }
  .section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:12px; font-family:'DM Mono',monospace; }
  .plan-row { display:flex; gap:12px; align-items:flex-start; padding:11px; border-radius:var(--rs); background:var(--surface); margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
  .plan-row:last-child { margin-bottom:0; }
  .plan-row.checked { background:#E8F5ED; }
  .plan-circle { width:26px; height:26px; border-radius:50%; border:2px solid var(--papaya); background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .plan-row.checked .plan-circle { background:var(--papaya); border-color:var(--papaya); }
  .plan-circle svg { width:13px; height:13px; stroke:#fff; opacity:0; }
  .plan-row.checked .plan-circle svg { opacity:1; }
  .plan-body { flex:1; }
  .plan-txt { font-size:13px; line-height:1.5; font-weight:500; color:var(--text); }
  .plan-row.checked .plan-txt { text-decoration:line-through; color:var(--text-dim); }
  .plan-tag { font-size:10px; font-family:'DM Mono',monospace; color:var(--text-dim); margin-top:2px; }
  .fiche-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .fdc { border-radius:var(--r); padding:14px 13px; }
  .fdc-music { background:var(--fuschia); }
  .fdc-legende { background:var(--papaya); }
  .fdc-capcut { background:var(--paradise); }
  .fdc-story { background:var(--palm); }
  .fdc-icon { font-size:18px; margin-bottom:6px; }
  .fdc-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:rgba(255,255,255,0.6); margin-bottom:5px; font-family:'DM Mono',monospace; }
  .fdc-val { font-size:11px; line-height:1.4; color:#fff; }
  .fdc-btn { margin-top:8px; font-size:11px; padding:7px 10px; border-radius:8px; background:rgba(0,0,0,0.2); color:#fff; border:none; cursor:pointer; font-weight:700; font-family:'DM Sans',sans-serif; width:100%; text-align:center; display:block; text-decoration:none; }
  .fiche-full-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:12px; }
  .fiche-full-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:8px; font-family:'DM Mono',monospace; }
  .fiche-full-val { font-size:13px; line-height:1.6; color:var(--text); }
  .recap-week-header { background:var(--palm); border-radius:var(--r); padding:14px 16px; margin-bottom:12px; color:var(--text-on-dark); }
  .recap-week-title { font-size:15px; font-weight:700; margin-bottom:2px; }
  .recap-week-sub { font-size:11px; color:var(--text-dim-dark); font-family:'DM Mono',monospace; }
  .recap-vid-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--r); margin-bottom:12px; overflow:hidden; }
  .recap-vid-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
  .recap-vid-title { font-size:14px; font-weight:700; color:var(--text); }
  .recap-vid-date { font-size:11px; color:var(--text-dim); font-family:'DM Mono',monospace; margin-top:2px; }
  .recap-vid-go { font-size:12px; color:var(--papaya); font-weight:700; border:none; background:none; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; padding:0; }
  .recap-plans { padding:0 16px 12px; border-top:1px solid var(--border); }
  .recap-plan-item { display:flex; gap:8px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--surface); }
  .recap-plan-item:last-child { border-bottom:none; }
  .recap-plan-num { width:20px; height:20px; background:var(--paradise); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:1px; }
  .recap-plan-txt { font-size:12px; line-height:1.4; color:var(--text); }
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">CM Tool ✦</div>
      <div class="topbar-page" id="topbar-page">Trends</div>
    </div>
    <div class="acc-switcher">
      <button class="acc-btn acc-lf active" id="acc-lf" onclick="toggleAccount('lf')" title="Le Foyer">LF</button>
      <button class="acc-btn acc-cpc active" id="acc-cpc" onclick="toggleAccount('cpc')" title="CPC">CPC</button>
      <button class="acc-btn acc-cm active" id="acc-cm" onclick="toggleAccount('cm')" title="CM au Japon">CM</button>
    </div>
  </div>

  <div class="main">
    <!-- PAGE 1 : FEED TRENDS -->
    <div id="page-trends" class="page active">
      <div class="feed-header">
        <div>
          <div class="feed-title">Trends 🌊</div>
          <div class="feed-sub" id="trends-sub">Toutes les niches</div>
        </div>
      </div>
      <div id="trends-content"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
      <div class="selbar" id="selbar">
        <div class="selbar-txt">✓ <span id="sel-count">0</span> trend(s)</div>
        <button class="btn btn-fuschia" onclick="addSelectionsAndGo()" style="padding:9px 14px;font-size:12px" id="selbar-btn">Ajouter →</button>
      </div>
    </div>

    <!-- PAGE 2 : MON CONTENU -->
    <div id="page-content" class="page">
      <div class="content-header">
        <div>
          <div class="feed-title">Mon contenu</div>
          <div class="feed-sub" id="content-sub">Tous les comptes</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" id="ctab-trends" onclick="switchContentTab('trends',this)">Trends</button>
        <button class="tab" id="ctab-ideas" onclick="switchContentTab('ideas',this)">Idées</button>
        <button class="tab" id="ctab-stories" onclick="switchContentTab('stories',this)">Stories</button>
      </div>
      <div id="content-trends-list"></div>
      <div id="content-ideas-list" style="display:none"></div>
      <div id="content-stories-list" style="display:none"></div>
    </div>

    <!-- PAGE 3 : PLANNING -->
    <div id="page-planning" class="page">
      <div class="plan-month-nav">

<script>
const TOKEN='pat7UkBy6pZuc1OdB.e475080d6ffc7260e18d7dfc1dc14bd9148141006ff34e0024ad87b2153fcce1';
const BASE='apprU7rHk2nqayxaS';
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const ACCOUNTS={
  lf:{name:'Le Foyer',emoji:'🍷',niche:'Food'},
  cpc:{name:'CPC',emoji:'🃏',niche:'TCG'},
  cm:{name:'CM au Japon',emoji:'🗾',niche:'CM'}
};
let activeAccounts=new Set(['lf','cpc','cm']);
let allTrends=[]; let trendsLoaded=false;
let allSels=[]; let selsSaved=false;
let selTrends={}; // {id:{date:''}}
let planStates={};
let curMonth=new Date().getMonth(); let curYear=new Date().getFullYear();
let dragId=null; let currentFicheId=null; let clientsCache={};
let currentPage='trends'; let currentContentTab='trends';

// ===== API =====
async function atFetch(table,params=''){
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(table)}?${params}`,{headers:{'Authorization':`Bearer ${TOKEN}`}});
  const d=await res.json(); if(d.error) console.warn('AT:',table,d.error); return d.records||[];
}
async function atCreate(table,fields){
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(table)}`,{method:'POST',headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({fields})});
  return await res.json();
}
async function atUpdate(table,id,fields){
  await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(table)}/${id}`,{method:'PATCH',headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({fields})});
}
async function atDelete(table,id){
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(table)}/${id}`,{method:'DELETE',headers:{'Authorization':`Bearer ${TOKEN}`}});
  return await res.json();
}

// ===== NAV =====
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nb-'+name)?.classList.add('active');
  const labels={trends:'Trends 🌊',content:'Mon contenu',planning:'Planning 📅',fiche:'Fiche 🎬'};
  document.getElementById('topbar-page').textContent=labels[name]||'';
  currentPage=name;
  if(name==='planning'){if(!selsSaved)loadSels();else renderCal();}
  if(name==='content') loadContent();
  if(name==='fiche') renderCurrentFicheTab();
}

// ===== ACCOUNT TOGGLE =====
function toggleAccount(acc){
  if(activeAccounts.has(acc)){
    if(activeAccounts.size===1) return;
    activeAccounts.delete(acc);
  } else { activeAccounts.add(acc); }
  document.getElementById('acc-'+acc).classList.toggle('active',activeAccounts.has(acc));
  updateSubtitle();
  if(currentPage==='trends') renderTrends();
  if(currentPage==='content') loadContent();
  if(currentPage==='planning') renderCal();
}
function updateSubtitle(){
  const names=[...activeAccounts].map(a=>ACCOUNTS[a].emoji+' '+ACCOUNTS[a].name).join(' · ');
  document.getElementById('trends-sub').textContent=names;
  document.getElementById('content-sub').textContent=names;
  // Sync client dropdowns to first active account
  const first=[...activeAccounts][0];
  ['cv-client','cs-client'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=first;});
}

// ===== FAB =====
function openFab(){
  if(currentPage==='trends') openModal('modal-trend');
  else if(currentPage==='content') openModal('modal-content');
  else if(currentPage==='planning') openModal('modal-content');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toggleMS(btn){btn.classList.toggle('selected');}
function switchModalTab(tab,btn){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.modal-form').forEach(f=>f.classList.remove('active'));
  document.getElementById('mf-'+tab).classList.add('active');
}

// ===== UTILS =====
function exField(str,field){try{return JSON.parse(str)[field]||'';}catch{return '';}}
function getPlans(str){
  try{const j=JSON.parse(str);const p=[];
  for(let i=1;i<=4;i++) if(j[`plan${i}`]&&j[`plan${i}`]!=='null'&&j[`plan${i}`]!==null) p.push({desc:j[`plan${i}`],type:j[`plan${i}_type`]||''});
  return p;}catch{return [];}
}
function isStory(r){return (r.fields['Note de tournage']||'').includes('[STORY]');}
function pillClass(r){
  if(isStory(r)) return 'vp-story';
  const s=r.fields['Statut']||'';
  if(s==='Filmé') return 'vp-filme';
  if(s==='En montage') return 'vp-montage';
  if(s==='Publié') return 'vp-publie';
  return 'vp-filmer';
}
function sbClass(s){
  if(s==='Filmé') return 'sb-filme';
  if(s==='En montage') return 'sb-montage';
  if(s==='Publié') return 'sb-publie';
  return 'sb-filmer';
}
function badgeClass(s){
  if(s==='Filmé') return 'cb-filme';
  if(s==='En montage') return 'cb-montage';
  if(s==='Publié') return 'cb-publie';
  return 'cb-filmer';
}
function cp(btn,text){navigator.clipboard.writeText(text).then(()=>{const o=btn.textContent;btn.textContent='✓ Copié!';setTimeout(()=>btn.textContent=o,2000);});}
function fmtDate(d){if(!d) return '—';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}

// ===== PAGE 1 : FEED TRENDS =====
async function loadTrends(){
  const el=document.getElementById('trends-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Chargement...</div>';
  let records=[];
  for(const n of ['Trends','trends']){records=await atFetch(n,'maxRecords=50');if(records.length){allTrends=records;break;}}
  trendsLoaded=true;
  renderTrends();
}

function renderTrends(){
  const el=document.getElementById('trends-content');
  // Filter by active accounts niches
  let filtered=allTrends;
  if(activeAccounts.size<3){
    const niches=[...activeAccounts].map(a=>ACCOUNTS[a].niche);
    filtered=allTrends.filter(r=>{
      const rn=[].concat(r.fields['Niches compatibles']||[]);
      return rn.length===0||rn.some(n=>niches.includes(n));
    });
  }
  if(!filtered.length){el.innerHTML='<div class="empty">Aucune trend — appuie sur + pour en créer une</div>';return;}
  el.innerHTML='<div class="feed-list">'+filtered.map(tFeedCard).join('')+'</div>'
    +'<div style="text-align:center;padding:20px 0"><button onclick="openModal(\'modal-trend\')" style="width:52px;height:52px;border-radius:50%;background:var(--papaya);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(189,104,9,0.3)">+</button></div>';
}

function tFeedCard(r){
  const f=r.fields;
  const title=f['Titre de la trend']||f['Titre']||'Sans titre';
  const desc=f['Description courte']||'';
  const diff=f['Difficulté']||'';
  const music=f['Nom de la musique']||'';
  const reseaux=[].concat(f['Réseaux']||[]);
  const isSel=!!selTrends[r.id];
  return `<div class="trend-feed-card ${isSel?'selected':''}" id="tfc-${r.id}">
    <div class="trend-feed-top">
      <div class="ttitle">${title}</div>
      <div class="tmeta">
        ${diff?`<span class="tag ${diff==='Facile'?'tag-fuschia':diff==='Moyen'?'tag-papaya':'tag-paradise'}">${diff}</span>`:''}
        ${reseaux.map(r=>`<span class="tag tag-gray">${r}</span>`).join('')}
      </div>
      ${desc?`<div class="tdesc">${desc}</div>`:''}
      ${music?`<div class="tmusic">♪ ${music}</div>`:''}
    </div>
    <div class="trend-feed-actions">
      <div class="tfa-left">
        <div class="tcheck-row" onclick="toggleTrend('${r.id}')">
          <div class="tcheck-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          <span>${isSel?'Sélectionnée':'Sélectionner'}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTrend('${r.id}')">🗑</button>
    </div>
    ${isSel?`<div style="padding:0 16px 14px;display:flex;gap:8px;align-items:center">
      <input type="date" class="date-mini-input" style="flex:1" id="date-${r.id}" placeholder="Date (optionnel)" value="${selTrends[r.id]?.date||''}" onchange="setTrendDate('${r.id}',this.value)">
      <button onclick="addOneTrend('${r.id}')" style="padding:8px 14px;border-radius:8px;background:var(--fuschia);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif">Ajouter →</button>
    </div>`:''}
  </div>`;
}

function toggleTrend(id){
  if(selTrends[id]) delete selTrends[id];
  else selTrends[id]={date:''};
  const count=Object.keys(selTrends).length;
  document.getElementById('sel-count').textContent=count;
  document.getElementById('selbar').classList.toggle('visible',count>0);
  // Re-render just this card
  const r=allTrends.find(r=>r.id===id);
  if(r){const el=document.getElementById('tfc-'+id);if(el)el.outerHTML=tFeedCard(r);}
}
function setTrendDate(id,val){if(selTrends[id])selTrends[id].date=val;}

async function addOneTrend(trendId){
  const trend=allTrends.find(r=>r.id===trendId);
  if(!trend) return;
  const trendTitle=trend.fields['Titre de la trend']||trend.fields['Titre']||'Trend';
  const date=selTrends[trendId]?.date||'';
  const btn=document.querySelector(`#tfc-${trendId} button[onclick*="addOneTrend"]`);
  if(btn){btn.textContent='...';btn.disabled=true;}
  for(const acc of activeAccounts){
    const accData=ACCOUNTS[acc];
    const clientId=clientsCache[accData.name]||null;
    const fields={'Titre':`${trendTitle} — ${accData.name}`,'Statut':'À filmer','Trend':[trendId]};
    if(date) fields['Date de tournage prévue']=date;
    if(clientId) fields['Client']=[clientId];
    // Remove Trend field if it causes issues - it's optional
    const result=await atCreate('Sélections',fields);
    if(result.error) console.error('Create sel error:', result.error);
  }
  // Force reload sels
  allSels=[];
  selsSaved=false;
  await loadSels(true);
  // Show feedback on card
  const card=document.getElementById('tfc-'+trendId);
  if(card){
    card.style.background='#f0fdf4';
    card.style.borderColor='#2F4731';
    setTimeout(()=>{
      card.style.background='';
      card.style.borderColor='';
      card.classList.remove('selected');
      // Re-render just this card
      const r=allTrends.find(r=>r.id===trendId);
      if(r) card.outerHTML=tFeedCard(r);
    },1500);
  }
}

async function addSelectionsAndGo(){
  const btn=document.getElementById('selbar-btn');
  btn.textContent='...'; btn.disabled=true;
  // For each active account, create a selection
  for(const [trendId,data] of Object.entries(selTrends)){
    const trend=allTrends.find(r=>r.id===trendId);
    const trendTitle=trend?.fields['Titre de la trend']||trend?.fields['Titre']||'Trend';
    for(const acc of activeAccounts){
      const accData=ACCOUNTS[acc];
        const clientId=clientsCache[accData.name]||null;
      const fields={'Titre':`${trendTitle} — ${accData.name}`,'Statut':'À filmer','Trend':[trendId]};
      if(data.date) fields['Date de tournage prévue']=data.date;
      if(clientId) fields['Client']=[clientId];
      await atCreate('Sélections',fields);
    }
  }
  selTrends={}; selsSaved=false;
  document.getElementById('selbar').classList.remove('visible');
  btn.textContent='Ajouter →'; btn.disabled=false;
  showPage('planning');
}

async function deleteTrend(id){
  if(!confirm('Supprimer cette trend ?')) return;
  const el=document.getElementById('tfc-'+id);
  if(el) el.style.opacity='0.4';
  const res=await atDelete('Trends',id);
  if(res.deleted){allTrends=allTrends.filter(r=>r.id!==id);renderTrends();}
  else{if(el)el.style.opacity='1';alert('Erreur suppression');}
}

// ===== CREATE TREND (modal admin) =====
async function createTrend(){
  const titre=document.getElementById('ct-titre').value.trim();
  if(!titre){document.getElementById('create-trend-msg').textContent='⚠️ Titre obligatoire';return;}
  const btn=document.querySelector('#modal-trend .btn');
  btn.textContent='...'; btn.disabled=true;
  const reseaux=[...document.querySelectorAll('#modal-trend .ms-opt.selected')].map(b=>b.textContent);
  const niche=document.getElementById('ct-niches').value;
  const fields={'Titre de la trend':titre};
  const desc=document.getElementById('ct-desc').value.trim();if(desc)fields['Description courte']=desc;
  const music=document.getElementById('ct-music').value.trim();if(music)fields['Nom de la musique']=music;
  const ml=document.getElementById('ct-music-link').value.trim();if(ml)fields['Lien de la musique']=ml;
  const diff=document.getElementById('ct-diff').value;if(diff)fields['Difficulté']=diff;
  const cc=document.getElementById('ct-capcut').value.trim();if(cc)fields['Template Cap Cut']=cc;
  const ex=document.getElementById('ct-exemple').value.trim();if(ex)fields['Vidéo exemple']=ex;
  if(reseaux.length)fields['Réseaux']=reseaux;
  if(niche)fields['Niches compatibles']=[niche];
  try{
    const r=await atCreate('Trends',fields);
    if(r.error) throw new Error(r.error.message);
    document.getElementById('create-trend-msg').textContent='✅ Trend créée !';
    document.getElementById('create-trend-msg').style.color='#2F4731';
    ['ct-titre','ct-desc','ct-music','ct-music-link','ct-capcut','ct-exemple'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('ct-diff').value='';document.getElementById('ct-niches').value='';
    document.querySelectorAll('#modal-trend .ms-opt.selected').forEach(b=>b.classList.remove('selected'));
    allTrends=[];trendsLoaded=false;
    await loadTrends();
    setTimeout(()=>{document.getElementById('create-trend-msg').textContent='';closeModal('modal-trend');},1500);
  }catch(e){document.getElementById('create-trend-msg').textContent='❌ '+e.message;document.getElementById('create-trend-msg').style.color='#dc2626';}
  btn.textContent='Créer →';btn.disabled=false;
}

// ===== PAGE 2 : MON CONTENU =====
function switchContentTab(tab,btn){
  currentContentTab=tab;
  document.querySelectorAll('#page-content .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['trends','ideas','stories'].forEach(t=>{document.getElementById('content-'+t+'-list').style.display=t===tab?'block':'none';});
}

async function loadContent(){
  const recs=await atFetch('Sélections','maxRecords=200&sort[0][field]=Date%20de%20tournage%20pr%C3%A9vue&sort[0][direction]=asc');
  allSels=recs; selsSaved=true;
  const activeNames=[...activeAccounts].map(a=>ACCOUNTS[a].name);
  const filtered=recs.filter(r=>{
    const title=r.fields['Titre']||'';
    return activeNames.some(name=>title.includes(name));
  });
  // Split by type
  const withTrend=filtered.filter(r=>r.fields['Trend']&&r.fields['Trend'].length>0&&!isStory(r));
  const ideas=filtered.filter(r=>(!r.fields['Trend']||r.fields['Trend'].length===0)&&!isStory(r));
  const stories=filtered.filter(r=>isStory(r));
  renderContentList('content-trends-list', withTrend, 'Aucune trend sélectionnée');
  renderContentList('content-ideas-list', ideas, 'Aucune idée de vidéo');
  renderContentList('content-stories-list', stories, 'Aucune story');
}

function renderContentList(elId, recs, emptyMsg){
  const el=document.getElementById(elId);
  const addBtn='<div style="text-align:center;padding:20px 0"><button onclick="openModal(\'modal-content\')" style="width:52px;height:52px;border-radius:50%;background:var(--papaya);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(189,104,9,0.3)">+</button></div>';
  if(!recs.length){el.innerHTML=`<div class="empty">${emptyMsg}</div>`+addBtn;return;}
  el.innerHTML=recs.map(r=>{
    const f=r.fields;
    const title=f['Titre']||'Sans titre';
    const statut=f['Statut']||'À filmer';
    const date=fmtDate(f['Date de tournage prévue']);
    const dotColor=statut==='Filmé'?'#2F4731':statut==='En montage'?'#9A3F4A':statut==='Publié'?'#3D1419':'#BD6809';
    return `<div class="content-card" onclick="openFiche('${r.id}')">
      <div class="cc-dot" style="background:${dotColor}"></div>
      <div class="cc-info">
        <div class="cc-title">${title}</div>
        <div class="cc-meta">📅 ${date}</div>
      </div>
      <span class="cc-badge ${badgeClass(statut)}">${statut}</span>
      <span class="cc-arrow">›</span>
    </div>`;
  }).join('')+addBtn;
}

// ===== PAGE 3 : PLANNING =====
async function loadSels(force=false){
  if(selsSaved&&!force){renderCal();return;}
  const grid=document.getElementById('cal-grid');
  if(grid&&currentPage==='planning') grid.innerHTML='<div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>';
  allSels=await atFetch('Sélections','maxRecords=200');
  selsSaved=true;
  if(currentPage==='planning') renderCal();
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  document.getElementById('day-detail').innerHTML='';
  renderCal();
}

function renderCal(){
  document.getElementById('cal-label').textContent=`${MONTHS[curMonth]} ${curYear}`;
  const today=new Date();
  const firstDay=new Date(curYear,curMonth,1);
  const lastDay=new Date(curYear,curMonth+1,0);
  let startDow=firstDay.getDay();startDow=startDow===0?6:startDow-1;
  // Filter by active accounts
  const activeNames=[...activeAccounts].map(a=>ACCOUNTS[a].name);
  const filtered=allSels.filter(r=>{
    const title=r.fields['Titre']||'';
    return activeNames.some(name=>title.includes(name));
  });
  const byDay={};
  filtered.forEach(r=>{
    const d=r.fields['Date de tournage prévue'];if(!d)return;
    const dt=new Date(d);
    if(dt.getMonth()===curMonth&&dt.getFullYear()===curYear){
      const day=dt.getDate();if(!byDay[day])byDay[day]=[];byDay[day].push(r);
    }
  });
  let html='';
  for(let i=0;i<startDow;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=lastDay.getDate();day++){
    const isToday=today.getDate()===day&&today.getMonth()===curMonth&&today.getFullYear()===curYear;
    const sels=byDay[day]||[];
    html+=`<div class="cal-cell ${isToday?'today':''}" data-day="${day}" ondragover="dragOver(event,${day})" ondrop="dropOn(event,${day})" ondragleave="this.classList.remove('drag-over')">
      <div class="cal-dnum ${isToday?'today-n':''}">${day}</div>
      ${sels.map(r=>{
        const t=(r.fields['Titre']||'Vidéo').substring(0,14);
        const pc=pillClass(r);
        return `<button class="vpill ${pc}" draggable="true" ondragstart="dragStart(event,'${r.id}')" ondragend="dragEnd(event)" onmousedown="startLP(event,'${r.id}')" onmouseup="cancelLP()" onmouseleave="cancelLP()" ontouchstart="startLP(event,'${r.id}')" ontouchend="cancelLP()" ontouchmove="cancelLP()" onclick="openFiche('${r.id}')">${t}</button>`;
      }).join('')}
    </div>`;
  }
  const rem=(startDow+lastDay.getDate())%7;
  if(rem>0)for(let i=0;i<7-rem;i++)html+=`<div class="cal-cell empty"></div>`;
  document.getElementById('cal-grid').innerHTML=html;
  setupTouchDrag();
}

// Long press delete
let lpTimer=null;
function startLP(e,id){lpTimer=setTimeout(()=>{lpTimer=null;deleteSel(id);},650);}
function cancelLP(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}}
async function deleteSel(id){
  if(!confirm('Supprimer cette vidéo ?'))return;
  await atDelete('Sélections',id);
  allSels=allSels.filter(r=>r.id!==id);
  renderCal();
}

// Drag & drop
function dragStart(e,id){dragId=id;e.dataTransfer?.setData('text/plain',id);setTimeout(()=>{document.querySelector(`.vpill[ondragstart*="${id}"]`)?.classList.add('dragging');},0);}
function dragEnd(e){document.querySelectorAll('.vpill').forEach(p=>p.classList.remove('dragging'));document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('drag-over'));dragId=null;}
function dragOver(e,day){e.preventDefault();e.currentTarget.classList.add('drag-over');}
async function dropOn(e,day){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const id=e.dataTransfer?.getData('text/plain')||dragId;if(!id)return;
  const newDate=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const r=allSels.find(r=>r.id===id);
  if(r){r.fields['Date de tournage prévue']=newDate;await atUpdate('Sélections',id,{'Date de tournage prévue':newDate});renderCal();}
  dragId=null;
}

function setupTouchDrag(){
  let tdId=null,clone=null;
  document.querySelectorAll('.vpill').forEach(pill=>{
    pill.addEventListener('touchstart',e=>{
      tdId=pill.getAttribute('ondragstart')?.match(/'([^']+)'/)?.[1];
      clone=pill.cloneNode(true);
      const rect=pill.getBoundingClientRect();
      clone.style.cssText=`position:fixed;opacity:0.7;pointer-events:none;z-index:9999;width:${pill.offsetWidth}px;font-size:10px;padding:4px 6px;border-radius:6px;left:${rect.left}px;top:${rect.top}px;`;
      document.body.appendChild(clone);pill.classList.add('dragging');
    },{passive:true});
    pill.addEventListener('touchmove',e=>{
      if(!clone)return;e.preventDefault();
      const t=e.touches[0];
      clone.style.left=(t.clientX-30)+'px';clone.style.top=(t.clientY-15)+'px';
      document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('drag-over'));
      document.elementFromPoint(t.clientX,t.clientY)?.closest('.cal-cell')?.classList.add('drag-over');
    },{passive:false});
    pill.addEventListener('touchend',async e=>{
      if(!clone||!tdId)return;
      const t=e.changedTouches[0];
      const cell=document.elementFromPoint(t.clientX,t.clientY)?.closest('.cal-cell[data-day]');
      clone.remove();clone=null;
      document.querySelectorAll('.vpill').forEach(p=>p.classList.remove('dragging'));
      document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('drag-over'));
      if(cell){
        const day=parseInt(cell.dataset.day);
        const newDate=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const r=allSels.find(r=>r.id===tdId);
        if(r){r.fields['Date de tournage prévue']=newDate;await atUpdate('Sélections',tdId,{'Date de tournage prévue':newDate});renderCal();}
      }
      tdId=null;
    },{passive:true});
  });
}

function openFiche(id){currentFicheId=id;showPage('fiche');}
function renderCurrentFicheTab(){
  if(document.getElementById('fiche-content').style.display!=='none')renderFiche(currentFicheId);
  else renderRecap();
}
function switchFicheTab(tab,btn){
  document.querySelectorAll('#fiche-tabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fiche-content').style.display=tab==='video'?'block':'none';
  document.getElementById('recap-content').style.display=tab==='recap'?'block':'none';
  if(tab==='video')renderFiche(currentFicheId);else renderRecap();
}

function renderFiche(id){
  const el=document.getElementById('fiche-content');
  if(!id){el.innerHTML='<div class="empty" style="padding-top:60px">👆 Clique sur une vidéo dans le planning</div>';return;}
  // Search in allSels first, then try to find via content
  let r=allSels.find(r=>r.id===id);
  if(!r){el.innerHTML='<div class="empty">Vidéo introuvable — retourne au planning</div>';return;}
  const f=r.fields;
  const title=f['Titre']||'Sans titre';
  const statut=f['Statut']||'À filmer';
  const lien=f['Lien fiche tournage']||'';
  const note=f['Note de tournage']||'';
  const ficheStr=f['Fiche de tournage']||'';
  const legende=exField(ficheStr,'legende');
  const story=exField(ficheStr,'story');
  const musique=exField(ficheStr,'musique');
  const rythme=exField(ficheStr,'rythme');
  const miniature=exField(ficheStr,'miniature');
  const capcut=f['Template CapCut']||exField(ficheStr,'capcut')||'';
  const plans=getPlans(ficheStr);
  if(!planStates[id])planStates[id]={};
  const steps=['À filmer','Filmé','En montage','Publié'];
  const curIdx=steps.indexOf(statut);
  const checked=Object.values(planStates[id]).filter(Boolean).length;
  const pbHtml=`<div class="progress-steps">${steps.map((s,i)=>`<div class="ps-step"><div class="ps-dot ${i<curIdx?'done':i===curIdx?'active':''}"></div><div class="ps-lbl ${i===curIdx?'active':''}">${s.replace('À filmer','Filmer').replace('En montage','Montage')}</div></div>${i<steps.length-1?`<div class="ps-line ${i<curIdx?'done':''}"></div>`:''}`).join('')}</div>`;
  const plansHtml=plans.length?`<div class="plans-section"><div class="section-title" id="planctr-${id}">📹 Plans (${checked}/${plans.length})</div>${plans.map((p,i)=>`<div class="plan-row ${planStates[id][i]?'checked':''}" id="pr-${id}-${i}" onclick="togglePlan('${id}',${i},${plans.length})"><div class="plan-circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="plan-body"><div class="plan-txt">${p.desc}</div><div class="plan-tag">${p.type==='slow'?'🎬 Slow':'⚡ Séquence rapide'}</div></div></div>`).join('')}</div>`:'';
  el.innerHTML=`
    <div class="fiche-hero">
      <div class="fiche-hero-top">
        <div class="fiche-hero-title">${title}</div>
        <button class="statut-badge ${sbClass(statut)}" onclick="cycleStatut('${id}')">${statut} →</button>
      </div>
      ${f['Trend']?`<div class="trend-pill"><span class="trend-pill-label">Trend</span><span class="trend-pill-val">${Array.isArray(f['Trend'])?f['Trend'][0]:f['Trend']}</span></div>`:''}
      ${pbHtml}
    </div>
    ${plansHtml}
    <div class="fiche-grid2">
      <div class="fdc fdc-music"><div class="fdc-icon">🎵</div><div class="fdc-label">Musique</div><div class="fdc-val">${musique||'—'}</div></div>
      <div class="fdc fdc-legende"><div class="fdc-icon">✍️</div><div class="fdc-label">Légende</div><div class="fdc-val">${legende?legende.substring(0,70)+'…':'—'}</div>${legende?`<button class="fdc-btn" onclick="cp(this,\`${legende.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">📋 Copier</button>`:''}</div>
      <div class="fdc fdc-capcut"><div class="fdc-icon">✂️</div><div class="fdc-label">CapCut</div><div class="fdc-val">${capcut?'Template dispo':'—'}</div>${capcut?`<a href="${capcut}" target="_blank" class="fdc-btn">Ouvrir →</a>`:''}</div>
      <div class="fdc fdc-story"><div class="fdc-icon">📱</div><div class="fdc-label">Phrase Story</div><div class="fdc-val">${story||'—'}</div>${story?`<button class="fdc-btn" onclick="cp(this,\`${story.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">📋 Copier</button>`:''}</div>
    </div>
    ${miniature?`<div class="fiche-full-card"><div class="fiche-full-label">💡 Miniature</div><div class="fiche-full-val">${miniature}</div></div>`:''}
    ${rythme?`<div class="fiche-full-card"><div class="fiche-full-label">🎬 Rythme</div><div class="fiche-full-val">${rythme}</div></div>`:''}
    ${note&&!note.includes('[STORY]')?`<div class="fiche-full-card"><div class="fiche-full-label">📝 Note</div><div class="fiche-full-val">${note}</div></div>`:''}
    ${lien?`<div style="text-align:center;padding:8px 0 20px"><a href="${lien}" target="_blank" style="color:var(--text-dim);font-size:12px;text-decoration:underline">↗ Voir la fiche PDF</a></div>`:''}
  `;
}

function togglePlan(id,idx,total){
  if(!planStates[id])planStates[id]={};
  planStates[id][idx]=!planStates[id][idx];
  document.getElementById(`pr-${id}-${idx}`)?.classList.toggle('checked',planStates[id][idx]);
  const checked=Object.values(planStates[id]).filter(Boolean).length;
  const ctr=document.getElementById(`planctr-${id}`);
  if(ctr)ctr.textContent=`📹 Plans (${checked}/${total})`;
}
async function cycleStatut(id){
  const r=allSels.find(r=>r.id===id);if(!r)return;
  const steps=['À filmer','Filmé','En montage','Publié'];
  const next=steps[(steps.indexOf(r.fields['Statut']||'À filmer')+1)%steps.length];
  r.fields['Statut']=next;
  await atUpdate('Sélections',id,{'Statut':next});
  renderFiche(id);
}

function renderRecap(){
  const el=document.getElementById('recap-content');
  if(!allSels.length){el.innerHTML='<div class="empty">Charge le planning d\'abord</div>';return;}
  const now=new Date();
  const sow=new Date(now);sow.setDate(now.getDate()-((now.getDay()+6)%7));sow.setHours(0,0,0,0);
  const eow=new Date(sow);eow.setDate(sow.getDate()+6);eow.setHours(23,59,59,999);
  const activeNames=[...activeAccounts].map(a=>ACCOUNTS[a].name);
  const week=allSels.filter(r=>{
    const d=r.fields['Date de tournage prévue'];if(!d)return false;
    const dt=new Date(d);
    const title=r.fields['Titre']||'';
    return dt>=sow&&dt<=eow&&activeNames.some(n=>title.includes(n));
  });
  const ss=sow.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'});
  const es=eow.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'});
  if(!week.length){el.innerHTML=`<div class="recap-week-header"><div class="recap-week-title">Semaine du ${ss}</div><div class="recap-week-sub">au ${es}</div></div><div class="empty">Aucune vidéo cette semaine 🎉</div>`;return;}
  let html=`<div class="recap-week-header"><div class="recap-week-title">📋 Semaine du ${ss}</div><div class="recap-week-sub">au ${es} · ${week.length} vidéo(s)</div></div>`;
  week.forEach(r=>{
    const f=r.fields;
    const title=f['Titre']||'Sans titre';
    const date=f['Date de tournage prévue']?new Date(f['Date de tournage prévue']).toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'short'}):'—';
    const plans=getPlans(f['Fiche de tournage']||'');
    html+=`<div class="recap-vid-card"><div class="recap-vid-header"><div><div class="recap-vid-title">${title}</div><div class="recap-vid-date">📅 ${date}</div></div><button class="recap-vid-go" onclick="goToFicheVideo('${r.id}')">Voir →</button></div>${plans.length?`<div class="recap-plans">${plans.map((p,i)=>`<div class="recap-plan-item"><div class="recap-plan-num">${i+1}</div><div class="recap-plan-txt">${p.desc}</div></div>`).join('')}</div>`:`<div style="padding:8px 16px 12px;font-size:12px;color:var(--text-dim)">Fiche pas encore générée</div>`}</div>`;
  });
  el.innerHTML=html;
}

function goToFicheVideo(id){
  currentFicheId=id;
  const tabs=document.querySelectorAll('#fiche-tabs .tab');
  tabs.forEach(t=>t.classList.remove('active'));tabs[0].classList.add('active');
  document.getElementById('fiche-content').style.display='block';
  document.getElementById('recap-content').style.display='none';
  renderFiche(id);
}
